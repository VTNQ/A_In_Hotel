jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🧱 Build backend
        run: |
          cd be
          mvn clean package -DskipTests

      - name: ⚛️ Build frontend
        run: |
          cd fe/SuperAdmin
          npm install
          npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: 🐳 Build & Push backend image
        run: |
          cd be
          docker build -t ${DOCKER_USERNAME}/ainhotel-be:latest .
          docker push ${DOCKER_USERNAME}/ainhotel-be:latest

      - name: 🐳 Build & Push frontend image
        run: |
          cd fe/SuperAdmin
          docker build -t ${DOCKER_USERNAME}/ainhotel-fe:latest .
          docker push ${DOCKER_USERNAME}/ainhotel-fe:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/deploy_web'
    steps:
      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ env.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ env.SERVER_USER }}/A_In_Hotel
            docker pull ${DOCKER_USERNAME}/ainhotel-be:latest
            docker pull ${DOCKER_USERNAME}/ainhotel-fe:latest
            docker-compose down
            docker-compose up -d --build
